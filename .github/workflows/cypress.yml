name: Cypress Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Option 1: Run tests against a deployed environment
      # - name: Run Cypress tests
      #   uses: cypress-io/github-action@v6
      #   with:
      #     browser: chrome
      #   env:
      #     CYPRESS_baseUrl: 'http://localhost:8002'

      # Option 2: Start local server and run tests (if app is in the same repo)
       - name: Start server and run tests
         uses: cypress-io/github-action@v6
         with:
           start: npm start
           wait-on: 'http://localhost:8002'
           wait-on-timeout: 120
           browser: chrome

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
